
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>

:root {
    color-scheme: light dark;

    --bg: oklch(100% 0 0);
    --btn: oklch(94% 0 0);
    --text: oklch(20% 0 0);
    --border: oklch(85% 0 0);

    --surface: color-mix(in srgb, var(--bg) 92%, var(--text) 8%);
    --surface-2: color-mix(in srgb, var(--bg) 96%, var(--text) 4%);

    --success: #00c853;
    --danger: #dc3545;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg: oklch(20% 0 0);
        --btn: oklch(20% 0 0);
        --text: oklch(94% 0 0);
        --border: oklch(85% 0 0);

        --surface: color-mix(in srgb, var(--bg) 92%, var(--text) 8%);
        --surface-2: color-mix(in srgb, var(--bg) 85%, var(--bg) 15%);
    }
}


body {
    margin: 0;
    padding: 0;
    background: var(--bg);
}

.question-box {
    padding: 2rem;
    background: var(--bg);
    color: var(--text);
}

#question {
    margin-bottom: 2em;
    font-size: 1.1rem;
}

#options {-webkit-appearance: none;
    display: grid;
    gap: 0.75rem;
    margin-bottom: 2em;
    padding: 0 1.5rem;
}

.option {
    padding: 1rem;
    font-size: 1.1rem;
    border: 1px solid;
    border-color: var(--border);
    border-radius: 0.25rem;
    background: var(--btn);
    cursor: pointer;
    text-align: center;
    color: var(--text)
}

.option:hover {
    filter: brightness(1.5);
}

.option.correct {
    background: color-mix(in srgb, var(--success) 30%, var(--surface));
    border-color: var(--success);
}

.option.wrong {
    background: color-mix(in srgb, var(--danger) 30%, var(--surface));
    border-color: var(--danger);
}

#navigation {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 2rem;
}


</style>
</head>

<body>
<div class="question-box">
  <h1></h1>
  <p id="question"></p>
  <div id="options"></div>

  <div id="navigation">
    <button id="prevButton">Previous</button>
    <button id="revealButton">Reveal</button>
    <button id="nextButton">Next</button>
  </div>
</div>

<script>
const quiz = {"title": "Quiz : Structures de Donn\u00e9es", "questions": [{"question": "Quelle est la complexit\u00e9 temporelle moyenne d'une op\u00e9ration SEARCH dans une Hash Map ?", "options": ["O(1)", "*O(log n)*", "$a \\leftarrow b$  O(n)", "O(n\u00b2)"], "correct_index": 0}, {"question": "Dans quel type de structure de donn\u00e9es l'\u00e9l\u00e9ment en dernier entr\u00e9 est le premier \u00e0 sortir ?", "options": ["File d'attente (Queue)", "Pile (Stack)", "Liste cha\u00een\u00e9e simple", "Arbre binaire"], "correct_index": 1}, {"question": "Quelle op\u00e9ration est la plus lente dans une liste cha\u00een\u00e9e compar\u00e9e \u00e0 un tableau ?", "options": ["Acc\u00e8s par index", "Insertion en t\u00eate", "Suppression du premier \u00e9l\u00e9ment", "Parcourir tous les \u00e9l\u00e9ments"], "correct_index": 0}, {"question": "Quelle structure de donn\u00e9es est utilis\u00e9e pour impl\u00e9menter un algorithme d'inversage ?", "options": ["File d'attente doublement cha\u00een\u00e9e", "Pile et File d'attente simultan\u00e9es", "Arbre B", "Hash Table"], "correct_index": 1}, {"question": "Quel est l'inconv\u00e9nient principal des tables de hachage ?", "options": ["Elles ne supportent pas les suppressions", "Les collisions peuvent d\u00e9grader la performance \u00e0 O(n) dans certains cas", "La m\u00e9moire est sous-utilis\u00e9e m\u00eame si on stocke peu d'\u00e9l\u00e9ments", "Elles n\u00e9cessitent une connaissance du nombre exact d'op\u00e9rations avant cr\u00e9ation"], "correct_index": 1}, {"question": "Dans un arbre B, qu'est-ce que M repr\u00e9sente ?", "options": ["La hauteur minimale de l'arbre", "Le nombre maximum d'enfants pour n\u0153ud int\u00e9rieur", "Le facteur d'\u00e9quilibrage global de l'arbre", "La charge moyenne du disque dur lors des insertions/suppressions."], "correct_index": 1}, {"question": "Quelle op\u00e9ration est O(\u221an dans le pire cas pour un arbre B ?", "options": ["Recherche d'une cl\u00e9 sp\u00e9cifique", "Insertion ou suppression de n\u0153uds en fonction du nombre d'\u00e9l\u00e9ments \u00e0 traiter.", "Parcourir toutes les feuilles en profondeur.", "Mise \u00e0 jour racine apr\u00e8s insertion/suppression massives."], "correct_index": 1}, {"question": "Dans quelle structure peut-on trouver une paire de nombres dont la somme est \u00e9gale \u00e0 une valeur cible en temps optimal ?", "options": ["Liste cha\u00een\u00e9e non tri\u00e9e", "Tableau avec deux pointeurs (left/right pointer technique).", "Hash Table pour stocker les compl\u00e9mentaires.", "Arbre binaire binomial ou arbre AVL."], "correct_index": 2}, {"question": "Quel type de structure convient mieux \u00e0 un navigateur d'historique ?", "options": ["File d'attente FIFO seule", "Liste cha\u00een\u00e9e doublement avec gestion des \u00e9tats pr\u00e9c\u00e9dent/suivant.", "Pile LIFO simple pour les actions annulables.", "Arbre B multi-niveaux hi\u00e9rarchis\u00e9 par session utilisateur."], "correct_index": 2}, {"question": "Quelle op\u00e9ration est O(\u221an dans un tas binaire ?", "options": ["Recherche d'un \u00e9l\u00e9ment sp\u00e9cifique arbitraire", "Insertion en fonction du nombre total de cl\u00e9s stock\u00e9es.", "Extraction de l'\u00e9l\u00e9ment minimum/maximum racine apr\u00e8s suppression massive.", "Parcourir toutes les feuilles pour trouver une valeur cible donn\u00e9e par niveau maximal autoris\u00e9."], "correct_index": 2}, {"question": "Dans quel cas l'arbre B redimensionne-t-il sa taille ?", "options": ["Lorsqu'une feuille contient M/2+1 \u00e9l\u00e9ments au maximum", "Lorsque la racine devient inapte \u00e0 supporter plus d'enfants internes.", "Quand on doit supprimer un n\u0153ud contenant une cl\u00e9 interne uniquement.", "Si le facteur d'\u00e9quilibrage global d\u00e9passe 50% du nombre maximal th\u00e9orique possible de cl\u00e9s stock\u00e9es dans l'arbre B actuel."], "correct_index": 1}, {"question": "Quelle op\u00e9ration est O(\u221an dans le pire cas pour un arbre AVL ?", "options": ["Recherche d'une cl\u00e9 sp\u00e9cifique", "Insertion ou suppression de n\u0153uds en fonction du nombre d'\u00e9l\u00e9ments \u00e0 traiter.", "Parcourir toutes les feuilles en profondeur.", "Mise \u00e0 jour racine apr\u00e8s insertion/suppression massives."], "correct_index": 1}, {"question": "Dans quelle structure peut-on trouver une paire de nombres dont la somme est \u00e9gale \u00e0 une valeur cible en temps optimal ?", "options": ["Liste cha\u00een\u00e9e non tri\u00e9e", "Tableau avec deux pointeurs (left/right pointer technique).", "Hash Table pour stocker les compl\u00e9mentaires.", "Arbre binaire binomial ou arbre AVL."], "correct_index": 2}, {"question": "Quelle op\u00e9ration est O(log n) dans un tas binaire ?", "options": ["Recherche d'un \u00e9l\u00e9ment sp\u00e9cifique arbitraire", "Insertion en fonction du nombre total de cl\u00e9s stock\u00e9es.", "Extraction de l'\u00e9l\u00e9ment minimum/maximum racine apr\u00e8s suppression massive.", "Parcourir toutes les feuilles pour trouver une valeur cible donn\u00e9e par niveau maximal autoris\u00e9."], "correct_index": 0}, {"question": "Quelle op\u00e9ration est constante en temps dans un tas binaire ?", "options": ["Recherche d'un \u00e9l\u00e9ment sp\u00e9cifique arbitraire", "Insertion ou suppression de racine apr\u00e8s ajustement massifs.", "Extraction de l'\u00e9l\u00e9ment minimum/maximum racine apr\u00e8s suppression massive.", "Parcourir toutes les feuilles pour trouver une valeur cible donn\u00e9e par niveau maximal autoris\u00e9."], "correct_index": 3}]};

// Try to load math library (WARNING: requires internet)
const ENABLE_MATHJAX = true;

let mathReady = false;

window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']]
  }
};

function loadMathJax() {
  return new Promise((resolve) => {
    if (!ENABLE_MATHJAX) {
      mathReady = false;
      resolve(false);
      return;
    }

    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js";

    script.onload = () => {
      mathReady = true;
      resolve(true);
    };

    script.onerror = () => {
      mathReady = false;
      resolve(false);
    };

    document.head.appendChild(script);
  });
}

// Helpers

function typesetMath() {
  if (window.MathJax) {
    MathJax.typesetPromise?.();
  }
}

function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
function renderMath(text) {
  if (!text) return "";

  return text.replace(/\$(.+?)\$/g, (match, expr) => {
    if (mathReady && window.MathJax) {
      return match;
    }
    return `<code>${expr}</code>`;
  });
}

function simpleMarkdownInline(text) {
  if (!text) return "";

  return renderMath(
    escapeHtml(text)
      .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
      .replace(/\*(.*?)\*/g, "<i>$1</i>")
  );
}

function simpleMarkdownBlock(text) {
  if (!text) return "";
  return simpleMarkdownInline(text).replace(/\n/g, "<br>");
}


// Height reporting script
function reportHeight() {
  const h = document.documentElement.scrollHeight;
  parent.postMessage({ type: 'iframe:height', height: h }, '*');
}
window.addEventListener('load', reportHeight);
new ResizeObserver(reportHeight).observe(document.body);

let currentQuestionIndex = 0;
let wrongAnswerCount = 0;

function renderQuiz() {
  const questionBox = document.querySelector(".question-box");
  const questionBoxTitle = questionBox.querySelector("h1");
  const questionText = questionBox.querySelector("#question");
  const optionsContainer = document.getElementById("options");
  const navigationContainer = questionBox.querySelector("#navigation");

  if (!quiz.questions || quiz.questions.length === 0) {
    document.getElementById("question").textContent = "No valid questions parsed";
    return;
  }
  
  // Update question
  questionBoxTitle.textContent = `${quiz.title} (${currentQuestionIndex + 1}/${quiz.questions.length})`;
  questionText.innerHTML = simpleMarkdownBlock(quiz.questions[currentQuestionIndex].question);

  // Clear and rebuild options
  optionsContainer.innerHTML = '';
  wrongAnswerCount = 0; // Answer button is revealed when user exhausted all options

  const currentQuestion = quiz.questions[currentQuestionIndex];

  currentQuestion.options.forEach((option, index) => {
    const button = document.createElement("button");
    button.innerHTML = simpleMarkdownInline(option);
    button.className = 'option'

    button.addEventListener("click", () => {
      if (index === currentQuestion.correct_index) {
        button.classList.add('correct');
        button.disabled = true;
        const allButtons = document.querySelectorAll('.option');
        allButtons.forEach(btn => btn.disabled = true);
      } else {
        button.classList.add('wrong');
        button.disabled = true;
        wrongAnswerCount++;
        const totalOptions = currentQuestion.options.length;
        if (wrongAnswerCount === totalOptions - 1) {
          revealAnswer();
          button.disabled = true;
        }
      }
    });

    optionsContainer.appendChild(button);

  });

  // Update button states
  const prevButton = navigationContainer.querySelector("#prevButton");
  const nextButton = navigationContainer.querySelector("#nextButton");

  prevButton.disabled = currentQuestionIndex === 0;
  nextButton.disabled = currentQuestionIndex === quiz.questions.length - 1;

if (window.MathJax) {
  setTimeout(() => {
    MathJax.typesetPromise?.();
  }, 0);
}
}

function nextQuestion() {
  if (currentQuestionIndex + 1 < quiz.questions.length) {
    currentQuestionIndex++
    renderQuiz();
  } else {
    renderQuiz();
  }
}

function revealAnswer() {
  const currentQuestion = quiz.questions[currentQuestionIndex];
  const optionsContainer = document.getElementById("options");

  // Get all buttons in the current question
  const buttons = optionsContainer.querySelectorAll("button");

  // Find and highlight the correct answer
  buttons.forEach(button => {
    const buttonIndex = Array.from(buttons).indexOf(button);
    if (buttonIndex === currentQuestion.correct_index) {
      button.classList.add('correct');
    }
  });
}

// Handle navigation buttons
const nextButton = document.getElementById("nextButton");
nextButton.addEventListener("click", nextQuestion);

const prevButton = document.getElementById("prevButton");
prevButton.addEventListener("click", () => {
  currentQuestionIndex = Math.max(0, currentQuestionIndex - 1);
  renderQuiz();
});

const revealButton = document.getElementById("revealButton");
revealButton.addEventListener("click", revealAnswer);

loadMathJax().then(() => {
  if (window.MathJax?.startup?.promise) {
    MathJax.startup.promise.then(renderQuiz);
  } else {
    renderQuiz();
  }
});

</script>

</body>
</html>
