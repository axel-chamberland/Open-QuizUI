
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz</title>

<style>

:root {
    color-scheme: light dark;

--bg: oklch(100% 0 0);
--btn: oklch(94% 0 0);
--text: oklch(20% 0 0);
--border: oklch(85% 0 0);

--surface: color-mix(in srgb, var(--bg) 92%, var(--text) 8%);
--surface-2: color-mix(in srgb, var(--bg) 96%, var(--text) 4%);

--success: #0fff93;
--danger: #ff4545;

--correct_bg: color-mix(in srgb, var(--success) 30%, var(--surface));
--wrong_bg: color-mix(in srgb, var(--danger) 30%, var(--surface));

}

@media (prefers-color-scheme: dark) {
    :root {

--bg: oklch(20% 0 0);
--btn: oklch(32% 0 0);
--text: oklch(94% 0 0);
--border: oklch(85% 0 0);

--surface: color-mix(in srgb, var(--bg) 92%, var(--text) 8%);
--surface-2: color-mix(in srgb, var(--bg) 85%, var(--bg) 15%);

--success: #00ff00;
--danger: #ff0000;

--correct_bg: color-mix(in srgb, var(--success) 30%, var(--surface));
--wrong_bg: color-mix(in srgb, var(--danger) 30%, var(--surface));

    }
}
* {
    box-sizing: border-box;
    font-family: inherit;
}
body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.question-box {
    display: flex;
    flex-direction: column;
    color: var(--text);
    width: min(800px, 100%);
}

#question {
    margin-bottom: 2em;
    font-size: 1.1rem;
}

#options {
    display: grid;
    grid-template-columns: 1;
    max-width: 100%;
    gap: 0.75rem;
    overflow-y: auto;
}

button {
    border: 1px solid;
    border-radius: 0.25rem;
    border-color: var(--border);
    background: var(--surface-2);
    cursor: pointer;
    text-align: center;
    color: var(--text);
    font-size: 1.1em;
}
.option{
    padding: 1rem;
}
button:disabled {
    opacity: 0.4;
}
.option:hover {
    filter: brightness(1.5);
}

.option.correct {
    background: var(--correct_bg);
    border-color: var(--success);
    opacity: 1;
}

.option.wrong {
    background: var(--wrong_bg);
    border-color: var(--danger);
    opacity: 1;
}

#navigation {

    display: flex;
    flex-wrap: nowrap;
    padding: 0.75rem;
    justify-content: center;
    gap: 0.5rem;

    z-index: 1000;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;

    user-select: none;
    -webkit-user-select: none;
}


#navigation button {
    font-size : 2rem;


}

#revealButton,
#maximizeButton,
#downloadButton,
#questionSelector {
    flex: 0 0 auto;
    min-width: 2rem;
}


#prevButton,
#nextButton {
    flex: 1;
    font-size: clamp(1.5rem, 5vw, 2rem);
    max-width: 4rem;
}


:fullscreen #navigation {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    margin-bottom: 0px;

    background: var(--bg);
    padding: 0.75rem;
    border-top: 1px solid var(--border);
    border-bottom: 0;
}

:fullscreen .question-box {
    padding-bottom: var(--nav-height);
}

#questionSelector {
    display: flex;
    align-items: center;
    white-space: nowrap;

    background: var(--surface-2);
    color: var(--text);

    border: 1px solid var(--border);
    border-radius: 0.25rem;

    font-size : 1.1rem;

    gap: 0.2rem;


}


#questionNumber {

    width: 3ch;
    text-align: center;
    font-size: 1.1rem;

    padding: 0;
    margin: 0;
    line-height: 1;

    background: transparent;
    color: var(--text);
    border: none;
    outline: none;

}


#questionNumber:focus {
    outline: none;
    border: none;
}

#questionCount {
    margin-right: 0.3em;
}

mjx-container {
    max-width: 100%;
    overflow-x: auto;
    white-space: normal;
}

</style>
</head>

<body>
<div class="question-box">
  <h1></h1>
  <div id="navigation">
    <button id="revealButton" onclick="revealAnswer()">⌕</button>
    <button id="maximizeButton" onclick="toggleFullscreen()">⛶</button>
    <button id="downloadButton" onclick="downloadQuizHTML()">⤓</button>

    <button id="prevButton" onclick="prevQuestion()">&lt</button>
    <div id="questionSelector">
        <input id="questionNumber" type="text" inputmode="numeric" value="1">
        <span class="separator">/</span>
        <span id="questionCount">1</span>
    </div>
    <button id="nextButton" onclick="nextQuestion()">&gt</button>
  </div>
  <p id="question"></p>

  <div id="options"></div>

</div>

<script>
const quiz = {"title": "Here's a quiz on space exploration history:", "questions": [{"question": "What was the name of the first artificial satellite launched into orbit?", "options": ["Explorer 1", "Sputnik 1", "Vanguard 1", "Telstar"], "correct_index": 1}, {"question": "Who was the first human to walk in space?", "options": ["Yuri Gagarin", "Alexei Leonov", "Buzz Aldrin", "Neil Armstrong"], "correct_index": 1}, {"question": "Which spacecraft carried the first humans to land on the Moon?", "options": ["Apollo 8", "Apollo 10", "Apollo 11", "Apollo 13"], "correct_index": 2}, {"question": "What is the name of NASA's rover currently exploring Mars' Jezero Crater (landed 2021)?", "options": ["Curiosity", "Opportunity", "Perseverance", "Sojourner"], "correct_index": 2}, {"question": "Which space telescope, launched in 2021, is designed to observe the universe primarily in infrared?", "options": ["Hubble Space Telescope", "James Webb Space Telescope", "Kepler Space Telescope", "Spitzer Space Telescope"], "correct_index": 1}, {"question": "What was the first reusable orbital-class rocket booster to land successfully after launch?", "options": ["Falcon 9 (SpaceX)", "Space Shuttle", "Saturn V", "New Shepard"], "correct_index": 0}, {"question": "Which country was the first to land a spacecraft on the far side of the Moon?", "options": ["United States", "Russia", "China", "India"], "correct_index": 2}]};

// Try to load math library (WARNING: requires internet)
const ENABLE_MATHJAX = true;

let mathReady = false;

let wrongAnswerCount = 0;


let optionButtons = [];
let currentQuestion = null;

let answerRevealed = false;


const questionBox = document.querySelector(".question-box");
const questionText = questionBox.querySelector("#question");
const optionsContainer = document.getElementById("options");
const navigationContainer = questionBox.querySelector("#navigation");
const questionNumber = document.getElementById("questionNumber");
// Update title
questionBox.querySelector("h1").textContent = `${quiz.title}`;

// Update max question count
const questionCount = document.getElementById("questionCount");

questionCount.textContent = quiz.questions.length;

let currentQuestionIndex = getStoredQuestionIndex();
questionNumber.value = currentQuestionIndex + 1;



window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
    }
};

function loadMathJax() {
    return new Promise((resolve) => {
        if (!ENABLE_MATHJAX) {
            mathReady = false;
            resolve(false);
            return;
        }

        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js";

        script.onload = () => {
            mathReady = true;
            resolve(true);
        };

        script.onerror = () => {
            mathReady = false;
            resolve(false);
        };

        document.head.appendChild(script);
    });
}

// UI events

// Get height of navigation bar for CSS (fullscreen mode)
const nav = document.getElementById("navigation");

function updateNavHeight() {
    document.documentElement.style.setProperty(
        "--nav-height",
        `${nav.offsetHeight}px`
    );
}

updateNavHeight();
new ResizeObserver(updateNavHeight).observe(nav);
window.addEventListener("resize", updateNavHeight);


function toggleFullscreen() {
    const el = document.documentElement;

    if (!document.fullscreenElement) {
        el.requestFullscreen?.();
    } else {
        document.exitFullscreen?.();
    }
}

// Helpers

function renderMath(text) {
    if (!text) return "";

    return text.replace(/\$(.+?)\$/g, (match, expr) => {
        if (mathReady && window.MathJax) {
            return match;
        }
        return `<code>${expr}</code>`;
    });
}

function renderInlineMarkdown(text) {
    if (!text) return "";

    text = text
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/\*(.*?)\*/g, "<i>$1</i>")

    return renderMath(text);
}

function renderMarkdown(text) {
    if (!text) return "";
    return renderInlineMarkdown(text).replace(/\n/g, "<br>");
}


async function renderQuiz() {
    const questionBox = document.querySelector(".question-box");
    const questionText = questionBox.querySelector("#question");
    const optionsContainer = document.getElementById("options");
    const navigationContainer = questionBox.querySelector("#navigation");

    if (!quiz.questions || quiz.questions.length === 0) {
        document.getElementById("question").textContent = "No valid questions parsed";
        return;
    }

    // Update question
    questionText.innerHTML = renderMarkdown(quiz.questions[currentQuestionIndex].question);

    // Clear and rebuild options
    optionsContainer.innerHTML = '';
    wrongAnswerCount = 0; // Answer button is revealed when user exhausted all options
    optionButtons = [];

    currentQuestion = quiz.questions[currentQuestionIndex];
    currentQuestion.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.innerHTML = renderMarkdown(option);
        button.className = "option";

        optionButtons.push(button);

        button.addEventListener("click", () => {
            handleAnswer(index, button);
        });

        optionsContainer.appendChild(button);
    });
    // Update button states
    const prevButton = navigationContainer.querySelector("#prevButton");
    const nextButton = navigationContainer.querySelector("#nextButton");

    prevButton.disabled = currentQuestionIndex === 0;
    nextButton.disabled = currentQuestionIndex === quiz.questions.length - 1;


    try {
        await MathJax.typesetPromise();
    } catch (err) {
        console.error(err);
    }



}

function nextQuestion() {
    goTo(currentQuestionIndex + 1)
}

function prevQuestion() {
    goTo(currentQuestionIndex - 1);
}

document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

    const key = e.key.toLowerCase();


    // Number = choose
    let index = -1;

    if (/^[1-9]$/.test(key)) {
        index = Number(key) - 1;
    }


    if (index >= 0 && index < optionButtons.length) {
        const button = optionButtons[index];
        if (!button.disabled) {
            handleAnswer(index, button);
        };
        return

    }

    // Reveal answer or go to next question
    if (key === "enter" || key == " ") {
        console.log("handled", key);
        e.preventDefault();

        if (!answerRevealed) {
            revealAnswer();
        } else {
            nextQuestion();
        }
        return;
    }

    // Navigation
    if (key === "arrowright" || key === "l") {
        e.preventDefault();
        nextQuestion();
        return;
    }

    if (key === "arrowleft" || key === "h") {
        e.preventDefault();
        prevQuestion();
        return;
    };
});

questionNumber.addEventListener("change", () => {
    if (!questionNumber.value) return;

    goTo(Number(questionNumber.value) - 1);
});

function goTo(question_index) {

    // Clamp between first and last question
    question_index = Math.max(
        0,
        Math.min(question_index, quiz.questions.length - 1)
    );

    currentQuestionIndex = question_index

    setStoredQuestionIndex(currentQuestionIndex);

    answerRevealed = false;

    questionNumber.value = currentQuestionIndex + 1;
    renderQuiz();
}

function handleAnswer(index, button) {
    if (index === currentQuestion.correct_index) {
        button.classList.add("correct");
        button.disabled = true;

        optionButtons.forEach(btn => btn.disabled = true);
    } else {
        button.classList.add("wrong");
        button.disabled = true;

        wrongAnswerCount++;

        if (wrongAnswerCount === currentQuestion.options.length - 1) {
            revealAnswer();
        }
    }
}

function revealAnswer() {
    answerRevealed = true;
    const currentQuestion = quiz.questions[currentQuestionIndex];
    const optionsContainer = document.getElementById("options");

    // Get all buttons in the current question
    const buttons = optionsContainer.querySelectorAll("button");

    // Highlight the correct answer
    buttons[currentQuestion.correct_index].classList.add("correct");
};

// Download as HTML

function downloadQuizHTML(filename = quiz.title) {
    // Get full document HTML
    const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();

    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function getStoredQuestionIndex() {
    try {
        return Number(localStorage.getItem("currentQuestionIndex") ?? 0);
    } catch (e) {
        return 0;
    }
}

function setStoredQuestionIndex(value) {
    try {
        localStorage.setItem("currentQuestionIndex", value);
    } catch (e) {
        // Ignore if storage is unavailable
    }
}


loadMathJax().then(() => {
    if (window.MathJax?.startup?.promise) {
        MathJax.startup.promise.then(renderQuiz);
    } else {
        renderQuiz();
    }
});

</script>
<script>
// Height reporting script
function reportHeight() {
    const h = document.documentElement.scrollHeight;
    parent.postMessage({ type: 'iframe:height', height: h }, '*');
}
window.addEventListener('load', reportHeight);
new ResizeObserver(reportHeight).observe(document.body);
</script>
</body>
</html>
