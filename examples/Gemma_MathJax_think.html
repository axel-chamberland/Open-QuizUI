
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz</title>

<style>

:root {
    color-scheme: light dark;

--bg: oklch(100% 0 0);
--btn: oklch(94% 0 0);
--text: oklch(20% 0 0);
--border: oklch(85% 0 0);

--surface: color-mix(in srgb, var(--bg) 92%, var(--text) 8%);
--surface-2: color-mix(in srgb, var(--bg) 96%, var(--text) 4%);

--success: #0fff93;
--danger: #ff4545;

--correct_bg: color-mix(in srgb, var(--success) 30%, var(--surface));
--wrong_bg: color-mix(in srgb, var(--danger) 30%, var(--surface));

}

@media (prefers-color-scheme: dark) {
    :root {

--bg: oklch(20% 0 0);
--btn: oklch(32% 0 0);
--text: oklch(94% 0 0);
--border: oklch(85% 0 0);

--surface: color-mix(in srgb, var(--bg) 92%, var(--text) 8%);
--surface-2: color-mix(in srgb, var(--bg) 85%, var(--bg) 15%);

--success: #00ff00;
--danger: #ff0000;

--correct_bg: color-mix(in srgb, var(--success) 30%, var(--surface));
--wrong_bg: color-mix(in srgb, var(--danger) 30%, var(--surface));

    }
}
* {
    box-sizing: border-box;
}
body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.question-box {
    display: flex;
    flex-direction: column;
    color: var(--text);
    width: min(800px, 100%);
}

#question {
    margin-bottom: 2em;
    font-size: 1.1rem;
}

#options {
    display: grid;
    grid-template-columns: 1;
    max-width: 100%;
    gap: 0.75rem;
    overflow-y: auto;
}

button {
    border: 1px solid;
    border-color: var(--border);
    background: var(--surface-2);
    cursor: pointer;
    text-align: center;
    color: var(--text);
    font-size: 1.1em;
}
.option{
    border-radius: 0.25rem;
    padding: 1rem;
}
button:disabled {
    opacity: 0.4;
}
.option:hover {
    filter: brightness(1.5);
}

.option.correct {
    background: var(--correct_bg);
    border-color: var(--success);
    opacity: 1;
}

.option.wrong {
    background: var(--wrong_bg);
    border-color: var(--danger);
    opacity: 1;
}

#navigation {

    display: flex;
    padding: 0.75rem;
    justify-content: center;
    gap: 0.5rem;

    z-index: 1000;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;

}

#navigation.button {
    font-size: 1.1em;

}
mjx-container {
    max-width: 100%;
    overflow-x: auto;
    white-space: normal;
}
:fullscreen #navigation {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    margin-bottom: 0px;

    background: var(--bg);
    padding: 0.75rem;
    
    border-top: 1px solid var(--border);
    border-bottom: 0;
}
:fullscreen .question-box {
    padding-bottom: var(--nav-height);
}

</style>
</head>

<body>
<div class="question-box">
  <h1></h1>
  <div id="navigation">
    <button id="prevButton" onclick="prevQuestion()">< Prev</button>
    <button id="revealButton" onclick="revealAnswer()">Reveal Answer</button>
    <button id="maximizeButton" onclick="toggleFullscreen()">Toggle Fullscreen</button>
    <button id="downloadButton" onclick="downloadQuizHTML()">Save</button>
    <button id="nextButton" onclick="nextQuestion()">Next ></button>
  </div>
  <p id="question"></p>

  <div id="options"></div>

</div>

<script>
const quiz = {"title": "\ud83e\udde0 The Ultimate MathJax Rendering Test Quiz", "questions": [{"question": "Basic Arithmetic & Parentheses Solve for $x$: $$x = 5 + (12 \\div 3) \\times 2$$", "options": ["$9$", "$13$", "$17$", "$20$"], "correct_index": 1}, {"question": "Exponents & Square Roots Calculate the value of: $$\\sqrt{64} + 3^2 - 5^0$$", "options": ["$16$", "$17$", "$18$", "$0$"], "correct_index": 0}, {"question": "Fractions & Division Simplify the following expression: $$\\frac{15 + 5}{10 - 5}$$", "options": ["$2$", "$4$", "$10$", "$20$"], "correct_index": 1}, {"question": "Summation Notation (Sigma) Evaluate the sum: $$\\sum_{n=1}^{4} n$$", "options": ["$4$", "$6$", "$10$", "$15$"], "correct_index": 2}, {"question": "The \"Ultimate MathJax\" Challenge Determine which of these mathematical expressions evaluates exactly to $1$:", "options": ["$\\lim_{n \\to \\infty} \\left( (1 + \\frac{1}{n})^n \\cdot e^{-1} \\right)$", "$\\int_{0}^{1} 2x \\, dx$", "$\\ln\\left(e^{\\sin(\\frac{\\pi}{2})}\\right)$", "All of the above are equal to $1$."], "correct_index": 3}]};

// Try to load math library (WARNING: requires internet)
const ENABLE_MATHJAX = true;

let mathReady = false;

window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
    }
};

function loadMathJax() {
    return new Promise((resolve) => {
        if (!ENABLE_MATHJAX) {
            mathReady = false;
            resolve(false);
            return;
        }

        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js";

        script.onload = () => {
            mathReady = true;
            resolve(true);
        };

        script.onerror = () => {
            mathReady = false;
            resolve(false);
        };

        document.head.appendChild(script);
    });
}

// UI events

// Get height of navigation bar for CSS (fullscreen mode)
const nav = document.getElementById("navigation");

function updateNavHeight() {
    document.documentElement.style.setProperty(
        "--nav-height",
        `${nav.offsetHeight}px`
    );
}

updateNavHeight();
new ResizeObserver(updateNavHeight).observe(nav);
window.addEventListener("resize", updateNavHeight);


function toggleFullscreen() {
    const el = document.documentElement;

    if (!document.fullscreenElement) {
        el.requestFullscreen?.();
    } else {
        document.exitFullscreen?.();
    }
}

// Helpers

function renderMath(text) {
    if (!text) return "";

    return text.replace(/\$(.+?)\$/g, (match, expr) => {
        if (mathReady && window.MathJax) {
            return match;
        }
        return `<code>${expr}</code>`;
    });
}

function simpleMarkdownInline(text) {
    if (!text) return "";

    return renderMath(
        text
            .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
            .replace(/\*(.*?)\*/g, "<i>$1</i>")
    );
}

function simpleMarkdownBlock(text) {
    if (!text) return "";
    return simpleMarkdownInline(text).replace(/\n/g, "<br>");
}

let currentQuestionIndex = 0;
let wrongAnswerCount = 0;


let optionButtons = [];
let currentQuestion = null;

async function renderQuiz() {
    const questionBox = document.querySelector(".question-box");
    const questionBoxTitle = questionBox.querySelector("h1");
    const questionText = questionBox.querySelector("#question");
    const optionsContainer = document.getElementById("options");
    const navigationContainer = questionBox.querySelector("#navigation");

    if (!quiz.questions || quiz.questions.length === 0) {
        document.getElementById("question").textContent = "No valid questions parsed";
        return;
    }

    // Update question
    questionBoxTitle.textContent = `${quiz.title} (${currentQuestionIndex + 1}/${quiz.questions.length})`;
    questionText.innerHTML = simpleMarkdownBlock(quiz.questions[currentQuestionIndex].question);

    // Clear and rebuild options
    optionsContainer.innerHTML = '';
    wrongAnswerCount = 0; // Answer button is revealed when user exhausted all options
    optionButtons = [];

    currentQuestion = quiz.questions[currentQuestionIndex];
    currentQuestion.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.innerHTML = simpleMarkdownInline(option);
        button.className = "option";

        optionButtons.push(button);

        button.addEventListener("click", () => {
            handleAnswer(index, button);
        });

        optionsContainer.appendChild(button);
    });
    // Update button states
    const prevButton = navigationContainer.querySelector("#prevButton");
    const nextButton = navigationContainer.querySelector("#nextButton");

    prevButton.disabled = currentQuestionIndex === 0;
    nextButton.disabled = currentQuestionIndex === quiz.questions.length - 1;


    try {
        await MathJax.typesetPromise();
    } catch (err) {
        console.error(err);
    }



}

function nextQuestion() {
    if (currentQuestionIndex + 1 < quiz.questions.length) {
        currentQuestionIndex++
        renderQuiz();
    } else {
        renderQuiz();
    }
}

function prevQuestion() {
    currentQuestionIndex = Math.max(0, currentQuestionIndex - 1);
    renderQuiz();
}

document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

    const key = e.key.toLowerCase();

    // 1–9 → 0–8
    let index = -1;

    if (/^[1-9]$/.test(key)) {
        index = Number(key) - 1;
    }

    // a–z → 0–25
    else if (/^[a-z]$/.test(key)) {
        index = key.charCodeAt(0) - 97;
    }

    if (index >= 0 && index < optionButtons.length) {
        const button = optionButtons[index];
        if (!button.disabled) {
            handleAnswer(index, button);
        };
        return

    }
    // Enter = reveal answer
    if (key === "enter") {
        revealAnswer();
        return;
    }

    // Arrow navigation
    if (key === "arrowright") {
        nextQuestion();
        return;
    }

    if (key === "arrowleft") {
        prevQuestion();
        return;
    };
});

function handleAnswer(index, button) {
    if (index === currentQuestion.correct_index) {
        button.classList.add("correct");
        button.disabled = true;

        optionButtons.forEach(btn => btn.disabled = true);
    } else {
        button.classList.add("wrong");
        button.disabled = true;

        wrongAnswerCount++;

        if (wrongAnswerCount === currentQuestion.options.length - 1) {
            revealAnswer();
        }
    }
}

function revealAnswer() {
    const currentQuestion = quiz.questions[currentQuestionIndex];
    const optionsContainer = document.getElementById("options");

    // Get all buttons in the current question
    const buttons = optionsContainer.querySelectorAll("button");

    // Find and highlight the correct answer
    buttons.forEach(button => {
        const buttonIndex = Array.from(buttons).indexOf(button);
        if (buttonIndex === currentQuestion.correct_index) {
            button.classList.add('correct');
        }
    });
}
function downloadQuizHTML(filename = "quiz.html") {
    // Get full document HTML
    const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();

    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}


loadMathJax().then(() => {
    if (window.MathJax?.startup?.promise) {
        MathJax.startup.promise.then(renderQuiz);
    } else {
        renderQuiz();
    }
});

</script>
<script>
// Height reporting script
function reportHeight() {
    const h = document.documentElement.scrollHeight;
    parent.postMessage({ type: 'iframe:height', height: h }, '*');
}
window.addEventListener('load', reportHeight);
new ResizeObserver(reportHeight).observe(document.body);
</script>
</body>
</html>
