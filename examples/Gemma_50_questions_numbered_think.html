
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz</title>

<style>

:root {
    color-scheme: light dark;

--bg: oklch(100% 0 0);
--btn: oklch(94% 0 0);
--text: oklch(20% 0 0);
--border: oklch(85% 0 0);

--surface: color-mix(in srgb, var(--bg) 92%, var(--text) 8%);
--surface-2: color-mix(in srgb, var(--bg) 96%, var(--text) 4%);

--success: #0fff93;
--danger: #ff4545;

--correct_bg: color-mix(in srgb, var(--success) 30%, var(--surface));
--wrong_bg: color-mix(in srgb, var(--danger) 30%, var(--surface));

}

@media (prefers-color-scheme: dark) {
    :root {

--bg: oklch(20% 0 0);
--btn: oklch(32% 0 0);
--text: oklch(94% 0 0);
--border: oklch(85% 0 0);

--surface: color-mix(in srgb, var(--bg) 92%, var(--text) 8%);
--surface-2: color-mix(in srgb, var(--bg) 85%, var(--bg) 15%);

--success: #00ff00;
--danger: #ff0000;

--correct_bg: color-mix(in srgb, var(--success) 30%, var(--surface));
--wrong_bg: color-mix(in srgb, var(--danger) 30%, var(--surface));

    }
}
* {
    box-sizing: border-box;
    font-family: inherit;
}
body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.question-box {
    display: flex;
    flex-direction: column;
    color: var(--text);
    width: min(800px, 100%);
}

#question {
    margin-bottom: 2em;
    font-size: 1.1rem;
}

#options {
    display: grid;
    grid-template-columns: 1;
    max-width: 100%;
    gap: 0.75rem;
    overflow-y: auto;
}

button {
    border: 1px solid;
    border-radius: 0.25rem;
    border-color: var(--border);
    background: var(--surface-2);
    cursor: pointer;
    text-align: center;
    color: var(--text);
    font-size: 1.1em;
}
.option{
    padding: 1rem;
}
button:disabled {
    opacity: 0.4;
}
.option:hover {
    filter: brightness(1.5);
}

.option.correct {
    background: var(--correct_bg);
    border-color: var(--success);
    opacity: 1;
}

.option.wrong {
    background: var(--wrong_bg);
    border-color: var(--danger);
    opacity: 1;
}

#navigation {

    display: flex;
    flex-wrap: nowrap;
    padding: 0.75rem;
    justify-content: center;
    gap: 0.5rem;

    z-index: 1000;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;

    user-select: none;
    -webkit-user-select: none;
}


#navigation button {
    font-size : 2rem;


}

#revealButton,
#maximizeButton,
#downloadButton,
#questionSelector {
    flex: 0 0 auto;
    min-width: 2rem;
}


#prevButton,
#nextButton {
    flex: 1;
    font-size: clamp(1.5rem, 5vw, 2rem);
    max-width: 4rem;
}


:fullscreen #navigation {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    margin-bottom: 0px;

    background: var(--bg);
    padding: 0.75rem;
    border-top: 1px solid var(--border);
    border-bottom: 0;
}

:fullscreen .question-box {
    padding-bottom: var(--nav-height);
}

#questionSelector {
    display: flex;
    align-items: center;
    white-space: nowrap;

    background: var(--surface-2);
    color: var(--text);

    border: 1px solid var(--border);
    border-radius: 0.25rem;

    font-size : 1.1rem;

    gap: 0.2rem;


}


#questionNumber {

    width: 3ch;
    text-align: center;
    font-size: 1.1rem;

    padding: 0;
    margin: 0;
    line-height: 1;

    background: transparent;
    color: var(--text);
    border: none;
    outline: none;

}


#questionNumber:focus {
    outline: none;
    border: none;
}

#questionCount {
    margin-right: 0.3em;
}

mjx-container {
    max-width: 100%;
    overflow-x: auto;
    white-space: normal;
}

</style>
</head>

<body>
<div class="question-box">
  <h1></h1>
  <div id="navigation">
    <button id="revealButton" onclick="revealAnswer()">⌕</button>
    <button id="maximizeButton" onclick="toggleFullscreen()">⛶</button>
    <button id="downloadButton" onclick="downloadQuizHTML()">⤓</button>

    <button id="prevButton" onclick="prevQuestion()">&lt</button>
    <div id="questionSelector">
        <input id="questionNumber" type="text" inputmode="numeric" value="1">
        <span class="separator">/</span>
        <span id="questionCount">1</span>
    </div>
    <button id="nextButton" onclick="nextQuestion()">&gt</button>
  </div>
  <p id="question"></p>

  <div id="options"></div>

</div>

<script>
const quiz = {"title": "MATHEMATICS QUIZ (50 QUESTIONS)", "questions": [{"question": "Theory Question: Is every continuous function differentiable?", "options": ["False", "True"], "correct_index": 0}, {"question": "Evaluate the sum: $\\sum_{n=0}^{\\infty} \\frac{1}{n!}$", "options": ["2", "$e$", "66", "94"], "correct_index": 1}, {"question": "Calculate the limit: $\\lim_{x \\to 0} \\frac{\\cos(x) - 1}{x^2}$", "options": ["5.27150509115801", "2.39150034171842", "-0.5", "9.73689218047478"], "correct_index": 2}, {"question": "Theory Question: Is the integral of $f'(x)$ from $a$ to $b$ always $f(b)-f(a)$?", "options": ["False", "True"], "correct_index": 1}, {"question": "Theory Question: Every convergent sequence is bounded.", "options": ["True", "False"], "correct_index": 0}, {"question": "Evaluate the definite integral: $\\int_{0}^{0.5} \\frac{1}{\\sqrt{1-x^2}} \\, dx$", "options": ["1.17684468395999", "2.57420490199626", "0.523598775598299", "-0.825659630779296"], "correct_index": 2}, {"question": "Evaluate the sum: $\\sum_{k=1}^{\\infty} \\frac{1}{k(k+1)}$", "options": ["11", "12", "1", "72"], "correct_index": 2}, {"question": "Theory Question: A function is Riemann integrable if it is continuous.", "options": ["True", "False"], "correct_index": 0}, {"question": "Calculate the limit: $\\lim_{x \\to 2} \\frac{x^2 - 4}{x - 2}$", "options": ["4", "6.60944494983734", "-1.05739566487719", "9.06351342084535"], "correct_index": 0}, {"question": "Evaluate the definite integral: $\\int_{0}^{\\pi/2} \\cos(x) \\, dx$", "options": ["4.99153802794773", "0.0505016054619183", "3.07703044538571", "1"], "correct_index": 3}, {"question": "Evaluate the sum: $\\sum_{k=1}^{5} k$", "options": ["64", "59", "15", "98"], "correct_index": 2}, {"question": "Theory Question: Is the function $|x|$ differentiable at $x=0$?", "options": ["False", "True"], "correct_index": 0}, {"question": "Evaluate the definite integral: $\\int_{0}^{1} x \\, dx$", "options": ["0.5", "3.80559117843956", "1.16222720713763", "1.662480343CA"], "correct_index": 0}, {"question": "Evaluate the sum: $\\sum_{n=0}^{\\infty} r^n$ (where $|r|<1$)", "options": ["3", "$-1/(r - 1)$", "81", "1"], "correct_index": 1}, {"question": "Evaluate the definite integral: $\\int_{0}^{1} e^x \\, dx$", "options": ["0.445288139206369", "1.40331550321233", "$e - 1$", "-0.352206778026156"], "correct_index": 2}, {"question": "Theory Question: Are all polynomials continuous everywhere?", "options": ["True", "False"], "correct_index": 0}, {"question": "Evaluate the sum: $\\sum_{n=1}^{\\infty} \\frac{1}{n^2}$", "options": ["19", "65", "77", "$\\pi^2/6$"], "correct_index": 3}, {"question": "Evaluate the sum: $\\sum_{i=1}^{4} i^2$", "options": ["81", "49", "30", "5"], "correct_index": 2}, {"question": "Calculate the limit: $\\lim_{x \\to \\infty} \\frac{\\ln(x)}{x}$", "options": ["2.43275683354404", "-0.196345097636976", "0", "5.50219536952165"], "correct_index": 2}, {"question": "Evaluate the definite integral: $\\int_{0}^{\\pi} \\sin^2(x) \\, dx$", "options": ["$\\pi/2$", "-0.652074615228089", "-0.555800664594067", "1.28954431132067"], "correct_index": 0}, {"question": "Evaluate the sum: $\\sum_{k=0}^{\\infty} (\\frac{1}{3})^k$", "options": ["1.5", "68", "52", "13"], "correct_index": 0}, {"question": "Evaluate the definite integral: $\\int_{0}^{\\infty} x e^{-x} \\, dx$", "options": ["1", "2.94338984233233", "3.75740297772419", "3.04321396215996"], "correct_index": 0}, {"question": "Evaluate the sum: $\\sum_{n=0}^{\\infty} \\frac{1}{2^n}$", "options": ["31", "39", "2", "97"], "correct_index": 2}, {"question": "Calculate the limit: $\\lim_{x \\to 3} \\frac{x - 3}{x^2 - 9}$", "options": ["$1/6$", "1.63338106095942", "9.87501664536870", "6.82466279766463"], "correct_index": 0}, {"question": "Theory Question: Does every continuous function on $[a, b]$ attain a maximum value? (Extreme Value Theorem)", "options": ["True", "False"], "correct_index": 0}, {"question": "Evaluate the sum: $\\sum_{n=0}^{\\infty} \\frac{(-1)^n}{n!}$", "options": ["100", "96", "28", "$e^{-1}$"], "correct_index": 3}, {"question": "Calculate the limit: $\\lim_{x \\to 0} \\frac{e^{x^2} - 1}{x}$", "options": ["0", "7.12000651198586", "-1.61486543870820", "2.04317317480548"], "correct_index": 0}, {"question": "Evaluate the definite integral: $\\int_{0}^{1} \\frac{1}{1+x^2} \\, dx$", "options": ["3.30294641227346", "$\\pi/4$", "1.99593289709151", "3.18577288874530"], "correct_index": 1}, {"question": "Calculate the limit: $\\lim_{x \\to \\infty} \\frac{3x + 1}{2x - 5}$", "options": ["-1.16517018800158", "1.5", "2.49549828063947", "7.79136670761914"], "correct_index": 1}, {"question": "Evaluate the sum: $\\sum_{i=1}^{10} i$", "options": ["84", "72", "52", "55"], "correct_index": 3}, {"question": "Evaluate the definite integral: $\\int_{0}^{2} x^3 \\, dx$", "options": ["1.33789622525276", "0.327951488257591", "1.57768210468730", "4"], "correct_index": 3}, {"question": "Calculate the limit: $\\lim_{x \\to \\infty} \\frac{1}{x}$", "options": ["3.99866822257642", "1.83238796524311", "0", "1.27592644391327"], "correct_index": 2}, {"question": "Calculate the limit: $\\lim_{x \\to 0} \\frac{\\sin(x)}{x}$", "options": ["4.98446202659103", "1.18668726010850", "1", "-0.653429367063457"], "correct_index": 2}, {"question": "Calculate the limit: $\\lim_{x \\to \\infty} \\frac{x}{e^x}$", "options": ["8.52304457924425", "0", "8.85376137531296", "-1.57423146736000"], "correct_index": 1}, {"question": "Theory Question: Is the limit of a sum equal to the sum of limits (if they exist)?", "options": ["True", "False"], "correct_index": 0}, {"question": "Theory Question: Is the set of rational numbers closed under addition?", "options": ["True", "False"], "correct_index": 0}, {"question": "Evaluate the sum: $\\sum_{k=1}^{100} (2k-1)$", "options": ["10000", "67", "52", "11"], "correct_index": 0}, {"question": "Evaluate the definite integral: $\\int_{0}^{\\pi} \\sin(x) \\, dx$", "options": ["-0.353702767204830", "3.72818292702966", "2", "0.00140656543258988"], "correct_index": 2}, {"question": "Evaluate the definite integral: $\\int_{2}^{4} \\frac{1}{x} \\, dx$", "options": ["$\\ln(2)$", "-0.323507617941232", "1.81905124791582", "-0.110793339305879"], "correct_index": 0}, {"question": "Evaluate the definite integral: $\\int_{1}^{e} \\frac{1}{x} \\, dx$", "options": ["2.73177162936634", "2.46193546945084", "1", "-0.784249095755332"], "correct_index": 2}, {"question": "Evaluate the sum: $\\sum_{i=1}^{\\infty} (\\frac{1}{2})^i$", "options": ["16", "29", "22", "1"], "correct_index": 3}, {"question": "Theory Question: Is every differentiable function continuous?", "options": ["True", "False"], "correct_index": 0}, {"question": "Calculate the limit: $\\lim_{x \\to 0} \\frac{e^x - 1}{x}$", "options": ["1", "3.66043886649442", "4.63545097236370", "6.45873382213185"], "correct_index": 0}, {"question": "Theory Question: Does the Mean Value Theorem apply to all functions on any interval?", "options": ["True", "False"], "correct_index": 1}, {"question": "Calculate the limit: $\\lim_{x \\to 0} \\frac{\\sin(2x)}{x}$", "options": ["2", "5.10058556300603", "-0.421768069321947", "1.46629438177467"], "correct_index": 0}, {"question": "Theory Question: The derivative of a constant is always zero.", "options": ["False", "True"], "correct_index": 1}, {"question": "Evaluate the definite integral: $\\int_{0}^{3} x^2 \\, dx$", "options": ["4.80571469790741", "3.75726076793001", "3.40954409450572", "9"], "correct_index": 3}, {"question": "Evaluate the definite integral: $\\int_{0}^{\\infty} e^{-x} \\, dx$", "options": ["-0.676606658159417", "1", "4.10650783541386", "0.517675556484594"], "correct_index": 1}, {"question": "Theory Question: Does every bounded sequence have a convergent subsequence? (Bolzano-Weierstrass)", "options": ["True", "False"], "correct_index": 0}, {"question": "Calculate the limit: $\\lim_{x \\to \\pi/2} \\frac{\\cos(x)}{\\pi/2 - x}$", "options": ["2.22355142726994", "8.31995914230270", "-0.947721168920804", "-1"], "correct_index": 3}]};

// Try to load math library (WARNING: requires internet)
const ENABLE_MATHJAX = true;

let mathReady = false;

let wrongAnswerCount = 0;


let optionButtons = [];
let currentQuestion = null;

let answerRevealed = false;


const questionBox = document.querySelector(".question-box");
const questionText = questionBox.querySelector("#question");
const optionsContainer = document.getElementById("options");
const navigationContainer = questionBox.querySelector("#navigation");
const questionNumber = document.getElementById("questionNumber");
// Update title
questionBox.querySelector("h1").textContent = `${quiz.title}`;

// Update max question count
const questionCount = document.getElementById("questionCount");

questionCount.textContent = quiz.questions.length;

let currentQuestionIndex = getStoredQuestionIndex();
questionNumber.value = currentQuestionIndex + 1;



window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
    }
};

function loadMathJax() {
    return new Promise((resolve) => {
        if (!ENABLE_MATHJAX) {
            mathReady = false;
            resolve(false);
            return;
        }

        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js";

        script.onload = () => {
            mathReady = true;
            resolve(true);
        };

        script.onerror = () => {
            mathReady = false;
            resolve(false);
        };

        document.head.appendChild(script);
    });
}

// UI events

// Get height of navigation bar for CSS (fullscreen mode)
const nav = document.getElementById("navigation");

function updateNavHeight() {
    document.documentElement.style.setProperty(
        "--nav-height",
        `${nav.offsetHeight}px`
    );
}

updateNavHeight();
new ResizeObserver(updateNavHeight).observe(nav);
window.addEventListener("resize", updateNavHeight);


function toggleFullscreen() {
    const el = document.documentElement;

    if (!document.fullscreenElement) {
        el.requestFullscreen?.();
    } else {
        document.exitFullscreen?.();
    }
}

// Helpers

function renderMath(text) {
    if (!text) return "";

    return text.replace(/\$(.+?)\$/g, (match, expr) => {
        if (mathReady && window.MathJax) {
            return match;
        }
        return `<code>${expr}</code>`;
    });
}

function renderInlineMarkdown(text) {
    if (!text) return "";

    text = text
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/\*(.*?)\*/g, "<i>$1</i>")

    return renderMath(text);
}

function renderMarkdown(text) {
    if (!text) return "";
    return renderInlineMarkdown(text).replace(/\n/g, "<br>");
}


async function renderQuiz() {
    const questionBox = document.querySelector(".question-box");
    const questionText = questionBox.querySelector("#question");
    const optionsContainer = document.getElementById("options");
    const navigationContainer = questionBox.querySelector("#navigation");

    if (!quiz.questions || quiz.questions.length === 0) {
        document.getElementById("question").textContent = "No valid questions parsed";
        return;
    }

    // Update question
    questionText.innerHTML = renderMarkdown(quiz.questions[currentQuestionIndex].question);

    // Clear and rebuild options
    optionsContainer.innerHTML = '';
    wrongAnswerCount = 0; // Answer button is revealed when user exhausted all options
    optionButtons = [];

    currentQuestion = quiz.questions[currentQuestionIndex];
    currentQuestion.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.innerHTML = renderMarkdown(option);
        button.className = "option";

        optionButtons.push(button);

        button.addEventListener("click", () => {
            handleAnswer(index, button);
        });

        optionsContainer.appendChild(button);
    });
    // Update button states
    const prevButton = navigationContainer.querySelector("#prevButton");
    const nextButton = navigationContainer.querySelector("#nextButton");

    prevButton.disabled = currentQuestionIndex === 0;
    nextButton.disabled = currentQuestionIndex === quiz.questions.length - 1;


    try {
        await MathJax.typesetPromise();
    } catch (err) {
        console.error(err);
    }



}

function nextQuestion() {
    goTo(currentQuestionIndex + 1)
}

function prevQuestion() {
    goTo(currentQuestionIndex - 1);
}

document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

    const key = e.key.toLowerCase();


    // Number = choose
    let index = -1;

    if (/^[1-9]$/.test(key)) {
        index = Number(key) - 1;
    }


    if (index >= 0 && index < optionButtons.length) {
        const button = optionButtons[index];
        if (!button.disabled) {
            handleAnswer(index, button);
        };
        return

    }

    // Reveal answer or go to next question
    if (key === "enter" || key == " ") {
        console.log("handled", key);
        e.preventDefault();

        if (!answerRevealed) {
            revealAnswer();
        } else {
            nextQuestion();
        }
        return;
    }

    // Navigation
    if (key === "arrowright" || key === "l") {
        e.preventDefault();
        nextQuestion();
        return;
    }

    if (key === "arrowleft" || key === "h") {
        e.preventDefault();
        prevQuestion();
        return;
    };
});

questionNumber.addEventListener("change", () => {
    if (!questionNumber.value) return;

    goTo(Number(questionNumber.value) - 1);
});

function goTo(question_index) {

    // Clamp between first and last question
    question_index = Math.max(
        0,
        Math.min(question_index, quiz.questions.length - 1)
    );

    currentQuestionIndex = question_index

    setStoredQuestionIndex(currentQuestionIndex);

    answerRevealed = false;

    questionNumber.value = currentQuestionIndex + 1;
    renderQuiz();
}

function handleAnswer(index, button) {
    if (index === currentQuestion.correct_index) {
        button.classList.add("correct");
        button.disabled = true;

        optionButtons.forEach(btn => btn.disabled = true);
    } else {
        button.classList.add("wrong");
        button.disabled = true;

        wrongAnswerCount++;

        if (wrongAnswerCount === currentQuestion.options.length - 1) {
            revealAnswer();
        }
    }
}

function revealAnswer() {
    answerRevealed = true;
    const currentQuestion = quiz.questions[currentQuestionIndex];
    const optionsContainer = document.getElementById("options");

    // Get all buttons in the current question
    const buttons = optionsContainer.querySelectorAll("button");

    // Highlight the correct answer
    buttons[currentQuestion.correct_index].classList.add("correct");
};

// Download as HTML

function downloadQuizHTML(filename = quiz.title) {
    // Get full document HTML
    const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();

    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function getStoredQuestionIndex() {
    try {
        return Number(localStorage.getItem("currentQuestionIndex") ?? 0);
    } catch (e) {
        return 0;
    }
}

function setStoredQuestionIndex(value) {
    try {
        localStorage.setItem("currentQuestionIndex", value);
    } catch (e) {
        // Ignore if storage is unavailable
    }
}


loadMathJax().then(() => {
    if (window.MathJax?.startup?.promise) {
        MathJax.startup.promise.then(renderQuiz);
    } else {
        renderQuiz();
    }
});

</script>
<script>
// Height reporting script
function reportHeight() {
    const h = document.documentElement.scrollHeight;
    parent.postMessage({ type: 'iframe:height', height: h }, '*');
}
window.addEventListener('load', reportHeight);
new ResizeObserver(reportHeight).observe(document.body);
</script>
</body>
</html>
