name: Pytest

on:
  push:
    branches: [main]
    paths:
      - "src/openquizui/**"
      - "tests/**"
      - "pyproject.toml"

  pull_request:
    branches: [main]
    paths:
      - "src/openquizui/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run tests
        run: pytest
